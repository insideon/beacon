name: 'Beacon Analysis'
description: 'AI-powered codebase analysis that posts results as a PR comment'
author: 'insideon'
branding:
  icon: 'search'
  color: 'blue'

inputs:
  provider:
    description: 'LLM provider (claude, openai, google, copilot, openrouter)'
    required: false
    default: 'claude'
  api-key:
    description: 'API key for the LLM provider'
    required: true
  model:
    description: 'LLM model override'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Beacon
      shell: bash
      run: npm install -g beacon-ai

    - name: Run Beacon Analysis
      shell: bash
      env:
        BEACON_PROVIDER: ${{ inputs.provider }}
        BEACON_API_KEY: ${{ inputs.api-key }}
        BEACON_MODEL: ${{ inputs.model }}
        NO_COLOR: '1'
      run: |
        # Create temporary config
        CONFIG="{\"llm\":{\"provider\":\"$BEACON_PROVIDER\",\"apiKey\":\"$BEACON_API_KEY\""
        if [ -n "$BEACON_MODEL" ]; then
          CONFIG="$CONFIG,\"model\":\"$BEACON_MODEL\""
        fi
        CONFIG="$CONFIG}}"
        echo "$CONFIG" > .beaconrc.json

        # Run analysis
        beacon analyze --json > /tmp/beacon-result.json 2>/tmp/beacon-stderr.log

        # Show stderr in logs for debugging
        if [ -s /tmp/beacon-stderr.log ]; then
          cat /tmp/beacon-stderr.log
        fi

        # Clean up config
        rm -f .beaconrc.json

    - name: Format Comment
      shell: bash
      run: |
        cat /tmp/beacon-result.json | bash ${{ github.action_path }}/action/format-comment.sh > /tmp/beacon-comment.md

    - name: Post PR Comment
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        bash ${{ github.action_path }}/action/post-comment.sh \
          "${{ github.event.pull_request.number }}" \
          "${{ github.repository }}" \
          /tmp/beacon-comment.md
